  <title>晶彩物流車隊保養維修紀錄</title>
  <style>
    :root { --ink:#172033; --muted:#667085; --line:#d8dee8; --page:#f5f7fa; --panel:#fff; --primary:#0f766e; --primary-dark:#0b5f59; --danger:#b42318; --warning:#b45309; --soft-red:#fff0ee; --soft-amber:#fff5e6; --soft-teal:#e7f5f3; --shadow:none; font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif; }
    *{box-sizing:border-box} body{margin:0;min-height:100vh;color:var(--ink);background:var(--page)} button,input,select,textarea{font:inherit} button{border:0;cursor:pointer} button:disabled{opacity:.55;cursor:not-allowed}button:focus-visible{outline:3px solid rgba(15,118,110,.38);outline-offset:2px}
    input,select,textarea{width:100%;min-height:42px;border:1px solid var(--line);border-radius:8px;padding:10px 11px;color:var(--ink);background:#fff;outline:none} textarea{min-height:82px;resize:vertical} input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(15,118,110,.12)} label{color:#475467;font-size:13px;font-weight:800}
    .shell{min-height:100vh;display:grid;grid-template-columns:300px minmax(0,1fr)} .sidebar{height:100vh;position:sticky;top:0;padding:22px;background:#111827;color:#fff;display:flex;flex-direction:column;gap:16px}
    .brand{display:flex;align-items:center;gap:12px}.mark{width:42px;height:42px;border-radius:8px;display:grid;place-items:center;background:var(--primary);font-weight:900}.brand h1{margin:0;font-size:19px;line-height:1.2}.brand p{margin:4px 0 0;color:#aeb8c8;font-size:13px}
    .sidebar input{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.16);color:#fff}.sidebar input::placeholder{color:#9da8b8}.searchbox{display:grid;gap:8px}.searchbox label{color:#d9e3f0}
    .vehicle-list{min-height:0;overflow:auto;display:grid;gap:9px;padding-right:2px}.vehicle-group{display:grid;gap:8px}.vehicle-group-title{margin-top:6px;color:#d9e3f0;font-size:12px;font-weight:900;display:flex;justify-content:space-between}
    .vehicle-button{width:100%;text-align:left;color:#dbe4f0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:12px;display:grid;gap:4px}.vehicle-button strong{color:#fff;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.vehicle-button span{color:#aeb8c8;font-size:12px}.vehicle-button.active{background:var(--primary);border-color:var(--primary)}.vehicle-button.active span{color:#d9fffb}
    .side-actions{display:grid;gap:9px;margin-top:auto}.main{padding:24px;display:grid;gap:18px;align-content:start}.mobile-bar{display:none;position:sticky;top:0;z-index:10;padding:12px;background:#111827}.mobile-picker{display:none;padding:14px}.mobile-vehicle-list{display:grid;gap:10px}.mobile-sidebar-close,.sidebar-backdrop{display:none}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}.topbar h2{margin:0;font-size:34px;line-height:1.15}.topbar p{margin:7px 0 0;color:var(--muted);line-height:1.45}.toolbar{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end}
    .button,.primary,.danger,.small{min-height:42px;border-radius:8px;padding:10px 14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;white-space:nowrap;border:1px solid transparent;transition:background-color .16s ease,border-color .16s ease}.primary{background:var(--primary);color:#fff}.primary:hover{background:var(--primary-dark)}.button{background:#fff;color:var(--ink);border-color:var(--line)}.button:hover,.small:hover{background:#f2f5f8}.sidebar .button{color:#fff;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}.sidebar .button:hover{background:rgba(255,255,255,.14)}.danger{color:var(--danger);background:var(--soft-red);border-color:#ffd1cb}.small{min-height:34px;padding:7px 10px;color:var(--ink);background:#eef2f7}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.stat{min-height:104px;padding:16px;border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow);display:grid;align-content:space-between}.stat span{color:var(--muted);font-size:13px;font-weight:800}.stat strong{font-size:24px;overflow-wrap:anywhere}
    .grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(360px,420px);gap:18px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.panel-head{padding:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}.panel-head h3{margin:0;font-size:18px}.panel-body{padding:16px}.filters{padding:16px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:minmax(180px,1fr) 150px 150px;gap:10px}
    .record-list,.reminder-list,.user-list{display:grid;gap:10px}.record-list{padding:16px}.record-card,.recent-item{border:1px solid var(--line);border-radius:8px;background:#fff;padding:14px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;text-align:left}.recent-item{grid-template-columns:1fr}.record-title{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:8px}.record-title strong,.recent-item strong{overflow-wrap:anywhere;font-size:16px}.meta{color:var(--muted);font-size:13px;display:flex;flex-wrap:wrap;gap:12px;line-height:1.45}.note{margin-top:8px;line-height:1.55;color:#344054;overflow-wrap:anywhere}.tag{border-radius:999px;padding:4px 8px;font-size:12px;font-weight:900;background:#eef2f7;color:#344054}.tag.service{background:var(--soft-teal);color:var(--primary-dark)}.tag.repair{background:var(--soft-amber);color:var(--warning)}
    .reminder{border:1px solid var(--line);border-radius:8px;background:#f9fbfc;padding:12px;display:grid;gap:4px}.reminder.warning{border-color:#e9bb76;background:var(--soft-amber)}.reminder.danger{border-color:#efaaa1;background:var(--soft-red)}.reminder strong{font-size:14px}.reminder span{color:var(--muted);font-size:13px;line-height:1.45}.empty{padding:28px 16px;color:var(--muted);text-align:center;border:1px dashed var(--line);border-radius:8px;background:#fbfcfe}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field{display:grid;gap:6px}.field.full{grid-column:1/-1}.form-actions{margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.service-items{display:grid;gap:8px}.service-item-row{display:grid;grid-template-columns:minmax(150px,1fr) minmax(150px,1fr) 130px 150px auto;gap:8px;align-items:center}.mileage-base-check{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;font-weight:800}.mileage-base-check input{width:auto}
    .modal-backdrop{position:fixed;inset:0;z-index:30;padding:18px;background:rgba(15,23,42,.48);display:none;align-items:center;justify-content:center}.modal-backdrop.open{display:flex}.modal{width:min(760px,100%);max-height:calc(100vh - 36px);overflow:auto;border-radius:8px;border:1px solid var(--line);background:#fff;box-shadow:0 24px 70px rgba(0,0,0,.22)}
    .toast{position:fixed;right:18px;bottom:18px;z-index:40;max-width:min(360px,calc(100vw - 36px));border-radius:8px;padding:12px 14px;color:#fff;background:#111827;opacity:0;transform:translateY(10px);pointer-events:none;transition:opacity .2s ease,transform .2s ease}.toast.show{opacity:1;transform:translateY(0)}
    .login-screen{position:fixed;inset:0;z-index:50;display:none;place-items:center;padding:20px;background:#f5f7fa}body.login-required .login-screen{display:grid}body.login-required .mobile-bar,body.login-required .mobile-picker,body.login-required .shell,body.login-required .sidebar-backdrop{display:none!important}.login-card{width:min(420px,100%);padding:24px;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);display:grid;gap:16px}.login-card h2{margin:0;font-size:26px}.login-card p{margin:0;color:var(--muted)}
    .account-bar{display:flex;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:8px;color:var(--muted);font-size:13px;font-weight:800}.user-row{display:grid;grid-template-columns:1fr;gap:8px;padding:10px;border:1px solid var(--line);border-radius:8px;background:#fbfcfe}.home-page,.account-page{display:grid;gap:18px;align-content:start}.calendar-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.calendar-title{font-size:20px;font-weight:900}.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-top:1px solid var(--line);border-left:1px solid var(--line)}.calendar-weekday,.calendar-day{min-height:92px;padding:8px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#fff}.calendar-weekday{min-height:auto;background:#f8fafc;color:var(--muted);font-size:12px;font-weight:900;text-align:center}.calendar-day{display:grid;align-content:start;gap:5px;cursor:pointer;text-align:left}.calendar-day:hover{background:#f2f8f7}.calendar-day.muted{background:#f8fafc;color:#98a2b3}.calendar-day.today{background:#e7f5f3;outline:3px solid rgba(15,118,110,.35);outline-offset:-3px}.calendar-day.today strong{width:max-content;min-width:26px;border-radius:999px;padding:3px 7px;background:var(--primary);color:#fff;text-align:center}.calendar-day strong{font-size:13px}.calendar-item{border-radius:6px;padding:4px 6px;font-weight:800;text-align:left;width:100%;background:var(--soft-teal);color:var(--primary-dark);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ocr-layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,360px);gap:14px;align-items:start}.photo-preview{min-height:220px;border:1px dashed var(--line);border-radius:8px;background:#fbfcfe;display:grid;place-items:center;overflow:hidden;color:var(--muted);text-align:center}.photo-preview img{width:100%;height:100%;max-height:360px;object-fit:contain}.ocr-status{min-height:20px;color:var(--muted);font-size:13px;font-weight:800}.hidden{display:none!important}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;transition:none!important}}@media(max-width:1120px){.shell{grid-template-columns:1fr}.sidebar{display:flex;position:fixed;inset:0 auto 0 0;width:min(86vw,320px);height:100vh;z-index:25;transform:translateX(-105%);transition:transform .2s ease;box-shadow:18px 0 48px rgba(15,23,42,.28)}body.sidebar-open .sidebar{transform:translateX(0)}.mobile-sidebar-close{display:inline-flex}.sidebar-backdrop{position:fixed;inset:0;z-index:24;background:rgba(15,23,42,.42)}body.sidebar-open .sidebar-backdrop{display:block}.mobile-bar{display:flex}.main{padding:18px}.mobile-picker{display:block}.mobile-back{display:inline-flex}body.mobile-picker-mode .main{display:none}body.mobile-detail-mode .mobile-picker{display:none}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.grid{grid-template-columns:1fr}}
    @media(max-width:720px){.main{padding:14px}.topbar{display:grid}.toolbar{justify-content:stretch}.toolbar button,.toolbar label{flex:1 1 140px}.stats,.filters,.form-grid,.service-item-row,.record-card,.ocr-layout{grid-template-columns:1fr}.calendar-day{min-height:76px;padding:6px}.calendar-item{font-size:11px}.form-actions{align-items:stretch}}
  </style>
</head>
<body>
  <section class="login-screen" id="loginScreen"><form class="login-card" id="loginForm"><div><h2>晶彩物流保養系統</h2><p>請先登入後再查看車輛保養維修紀錄。</p></div><div class="field"><label for="loginUsername">帳號</label><input id="loginUsername" autocomplete="username" required></div><div class="field"><label for="loginPassword">密碼</label><input id="loginPassword" type="password" autocomplete="current-password" required></div><button class="primary" type="submit">登入</button></form></section>
  <div class="mobile-bar"><button class="button" id="mobileMenuBtn" type="button">車輛</button></div>
  <section class="mobile-picker"><div class="mobile-picker-head"><h2>選擇車輛</h2><p>先選擇車輛，再查看明細與工單紀錄。</p></div><div class="mobile-vehicle-list" id="mobileVehicleList"></div></section>
  <div class="shell"><aside class="sidebar"><div class="brand"><div class="mark">晶</div><div><h1>晶彩物流車隊保養</h1><p>公司車輛維修保養紀錄</p></div></div><button class="button mobile-sidebar-close" id="mobileCloseSidebarBtn" type="button">收起車輛清單</button><div class="searchbox"><label for="shopSearch">快速查車</label><input id="shopSearch" type="search" placeholder="車牌、分組、備註"></div><div class="vehicle-list" id="vehicleList"></div><div class="side-actions"><button class="button" id="homeBtn" type="button">主頁面</button><button class="button hidden" id="accountPageBtn" type="button">帳號管理</button><button class="primary" id="addVehicleBtn" type="button">新增公司車輛</button></div></aside>
    <main class="main">
      <section class="home-page" id="homePage"><section class="topbar"><div><h2>主頁面</h2><p>查看近期維修車輛、預約與備份。</p></div><div class="toolbar"><button class="button" id="homeImportWorkOrderBtn" type="button">拍照匯入舊工單</button><button class="button" id="backupBtn" type="button">匯出備份</button><label class="button" for="restoreInput">匯入備份</label><input class="hidden" id="restoreInput" type="file" accept="application/json"></div></section><section class="panel"><div class="panel-head"><div><h3>預約月曆</h3></div><button class="primary" id="newAppointmentBtn" type="button">新增預約</button></div><div class="panel-body"><div class="calendar-head"><button class="button" id="prevMonthBtn" type="button">上個月</button><div class="calendar-title" id="calendarTitle"></div><button class="button" id="nextMonthBtn" type="button">下個月</button></div><div class="calendar-grid" id="appointmentCalendar"></div></div></section><section class="grid"><div class="panel"><div class="panel-head"><h3>近期維修車輛</h3></div><div class="record-list" id="recentVehicleList"></div></div><aside class="panel"><div class="panel-head"><h3>本月預約</h3></div><div class="record-list" id="appointmentList"></div></aside></section></section>
      <section class="account-page hidden" id="accountPage"><section class="topbar"><div><h2>帳號管理</h2><p>管理系統可使用的帳號與權限。</p></div></section><section class="panel"><div class="panel-head"><h3>帳號清單</h3></div><div class="panel-body"><div class="user-list" id="userList"></div><div class="form-actions"><button class="button" id="homeAddUserBtn" type="button">新增帳號</button><button class="primary" id="homeSaveUsersBtn" type="button">儲存帳號</button></div></div></section></section>
      <section class="topbar detail-page"><div><h2 id="vehicleTitle">晶彩物流車隊保養</h2><p id="vehicleSubtitle">請先新增或選擇車輛。</p></div><div class="toolbar"><button class="button mobile-back" id="mobileBackBtn" type="button">返回主頁</button><button class="button" id="editVehicleBtn" type="button">編輯車輛資料</button><button class="button" id="importWorkOrderBtn" type="button">拍照匯入舊工單</button><button class="primary" id="newRecordBtn" type="button">新增工單紀錄</button></div></section>
      <section class="stats detail-page"><div class="stat"><span>車輛分組</span><strong id="statGroup">未分組</strong></div><div class="stat"><span>目前里程</span><strong id="statMileage">0 km</strong></div><div class="stat"><span>工單數</span><strong id="statTotal">0 筆</strong></div><div class="stat"><span>提醒項目</span><strong id="statReminders">0 項</strong></div></section>
      <section class="grid detail-page"><div class="panel"><div class="panel-head"><h3>維修保養工單</h3><button class="small" id="exportCsvBtn" type="button">匯出表格</button></div><div class="filters"><input id="recordSearch" type="search" placeholder="搜尋施工項目、技師、備註"><select id="typeFilter"><option value="">全部類型</option><option value="service">保養</option><option value="repair">維修</option><option value="other">其他</option></select><select id="sortSelect"><option value="newest">新增順序新到舊</option><option value="oldest">新增順序舊到新</option><option value="mileage">里程高到低</option></select></div><div class="record-list" id="recordList"></div></div><aside class="panel"><div class="panel-head"><h3>里程提醒</h3><button class="small" id="quickServiceBtn" type="button">快速保養提醒</button></div><div class="panel-body"><div class="reminder-list" id="reminderList"></div><div class="field" style="margin-top:14px"><label for="vehicleQuickNote">該車備註</label><textarea id="vehicleQuickNote" placeholder="輸入這台車的備註，會自動儲存"></textarea></div></div></aside></section>
    </main></div><div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="modal-backdrop" id="vehicleModal"><div class="modal"><div class="panel-head"><h3 id="vehicleModalTitle">新增公司車輛</h3><button class="small" data-close="vehicleModal" type="button">關閉</button></div><form class="panel-body" id="vehicleForm"><div class="form-grid"><div class="field"><label for="plate">車牌</label><input id="plate" required placeholder="ABC-1234"></div><div class="field"><label for="vehicleGroup">車輛分組</label><input id="vehicleGroup" list="vehicleGroupOptions" placeholder="例如：環廠、長途、未分組"><datalist id="vehicleGroupOptions"><option value="未分組"></option><option value="環廠"></option><option value="長途"></option></datalist></div><div class="field"><label for="year">年份</label><input id="year" type="number" min="1950" max="2100" placeholder="2024"></div><div class="field"><label for="currentMileage">目前里程</label><input id="currentMileage" type="number" min="0" step="1" placeholder="35000"></div><div class="field full"><label for="vehicleNotes">該車備註</label><textarea id="vehicleNotes" placeholder="這台車的狀態、注意事項、其他備註"></textarea></div></div><div class="form-actions"><button class="danger hidden" id="deleteVehicleBtn" type="button">刪除公司車輛</button><div><button class="button" data-close="vehicleModal" type="button">取消</button><button class="primary" type="submit">儲存</button></div></div></form></div></div>
  <div class="modal-backdrop" id="recordModal"><div class="modal"><div class="panel-head"><h3 id="recordModalTitle">新增工單紀錄</h3><button class="small" data-close="recordModal" type="button">關閉</button></div><form class="panel-body" id="recordForm"><div class="form-grid"><div class="field"><label for="recordType">類型</label><select id="recordType" required><option value="service">保養</option><option value="repair">維修</option><option value="other">其他</option></select></div><div class="field full"><label>施工項目清單</label><div class="service-items" id="serviceItems"></div><button class="small" id="addServiceItemBtn" type="button">新增施工項目</button></div><div class="field"><label for="technician">技師</label><input id="technician" placeholder="技師"></div><div class="field"><label for="recordMileage">施工里程</label><input id="recordMileage" type="number" min="0" step="1" placeholder="35000"></div><div class="field full"><label for="recordNotes">工單備註</label><textarea id="recordNotes" placeholder="整張工單的補充說明"></textarea></div></div><div class="form-actions"><button class="danger hidden" id="deleteRecordBtn" type="button">刪除工單</button><div><button class="button" data-close="recordModal" type="button">取消</button><button class="primary" type="submit">儲存工單</button></div></div></form></div></div>
  <div class="modal-backdrop" id="appointmentModal"><div class="modal"><div class="panel-head"><h3 id="appointmentModalTitle">新增預約</h3><button class="small" data-close="appointmentModal" type="button">關閉</button></div><form class="panel-body" id="appointmentForm"><div class="form-grid"><div class="field"><label for="appointmentDate">預約日期</label><input id="appointmentDate" type="date" required></div><div class="field"><label for="appointmentTime">預約時間</label><input id="appointmentTime" type="time" required></div><div class="field"><label for="appointmentPlate">車牌</label><input id="appointmentPlate" list="appointmentVehicleOptions" placeholder="輸入或選擇車牌"><datalist id="appointmentVehicleOptions"></datalist></div><div class="field full"><label for="appointmentTitle">預約內容</label><input id="appointmentTitle" required placeholder="例：定期保養、檢查煞車"></div><div class="field full"><label for="appointmentNotes">預約備註</label><textarea id="appointmentNotes" placeholder="補充說明"></textarea></div></div><div class="form-actions"><button class="danger hidden" id="deleteAppointmentBtn" type="button">刪除預約</button><div><button class="button" data-close="appointmentModal" type="button">取消</button><button class="primary" type="submit">儲存預約</button></div></div></form></div></div>
  <div class="modal-backdrop" id="dayAppointmentsModal"><div class="modal"><div class="panel-head"><h3 id="dayAppointmentsTitle">當日預約</h3><button class="small" data-close="dayAppointmentsModal" type="button">關閉</button></div><div class="panel-body"><div class="record-list" id="dayAppointmentsList"></div><div class="form-actions"><span></span><button class="primary" id="newDayAppointmentBtn" type="button">新增預約</button></div></div></div></div>

  <script>

    let editingVehicleId = null, editingRecordId = null, editingAppointmentId = null, mobileDetailVisible = false, syncTimer = null, currentUser = null, accountUsers = [], currentView = "home", syncing = false, calendarDate = new Date(), lastServerState = "";

    async function boot() { state = loadLocalState(); if (!serverMode) { currentUser = { username:"admin", role:"admin" }; applyLoginState(); render(); return; } try { const me = await fetch("/api/me", { cache:"no-store" }); if (!me.ok) return showLogin(); currentUser = await me.json(); applyLoginState(); await syncFromServer(); } catch { showLogin(); } }

    function applyLoginState() { document.body.classList.remove("login-required"); $("accountPageBtn").classList.toggle("hidden", currentUser?.role !== "admin"); if (currentUser?.role === "admin") loadAccountUsers().catch(() => {}); }

    async function logout() { if (serverMode) await fetch("/api/logout", { method:"POST" }).catch(() => {}); closeModal("accountModal"); boot(); }
    async function loadAccountUsers() { if (currentUser?.role !== "admin" || !serverMode) return; const response = await fetch("/api/users", { cache:"no-store" }); if (!response.ok) throw new Error(); accountUsers = await response.json(); renderAccountUsers(); }
    function renderAccountUsers() { [els.userList, $("modalUserList")].forEach(list => { if (!list) return; list.innerHTML = ""; accountUsers.forEach((user, index) => { const row = document.createElement("div"); row.className = "user-row"; row.innerHTML = `<input data-field="username" value="${escapeHtml(user.username || "")}" placeholder="帳號"><input data-field="password" value="${escapeHtml(user.password || "")}" placeholder="密碼"><select data-field="role"><option value="user">一般</option><option value="admin">管理員</option></select><button class="danger" type="button">刪除</button>`; row.querySelector("[data-field='role']").value = user.role === "admin" ? "admin" : "user"; row.querySelectorAll("[data-field]").forEach(input => input.addEventListener("input", event => accountUsers[index][event.target.dataset.field] = event.target.value)); row.querySelector("button").addEventListener("click", () => { accountUsers.splice(index, 1); renderAccountUsers(); }); list.appendChild(row); }); }); }
    async function saveUsers() { const users = accountUsers.map(user => ({ username:String(user.username || "").trim(), password:String(user.password || ""), role:user.role === "admin" ? "admin" : "user" })).filter(user => user.username && user.password); if (!users.some(user => user.username === "admin" && user.role === "admin")) users.unshift({ username:"admin", password:"admin", role:"admin" }); try { const response = await fetch("/api/users", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ users }) }); if (!response.ok) throw new Error(); accountUsers = users; renderAccountUsers(); showToast("帳號已儲存"); } catch { showToast("帳號儲存失敗"); } }
    function migrateState(data) { data = data || {}; data.vehicles = Array.isArray(data.vehicles) ? data.vehicles.map(v => ({ id:v.id || uid("veh"), plate:v.plate || "", vehicleGroup:v.vehicleGroup || v.group || "未分組", year:v.year || "", currentMileage:Number(v.currentMileage || 0), notes:v.notes || "" })) : []; data.records = Array.isArray(data.records) ? data.records.map(r => ({ ...r, id:r.id || uid("rec"), type:normalizeType(r.type), serviceItems:normalizeServiceItems(r), technician:r.technician || "", mileage:Number(r.mileage || 0), notes:r.notes || "" })) : []; data.appointments = Array.isArray(data.appointments) ? data.appointments.map(item => ({ id:item.id || uid("apt"), date:item.date || today, time:item.time || "", plate:item.plate || "", title:item.title || "預約", notes:item.notes || "" })) : []; data.revision = Number(data.revision) || 0; data.selectedVehicleId = data.selectedVehicleId || data.vehicles[0]?.id || ""; return data; }
    function serverState() { const { selectedVehicleId, ...data } = state; return data; }
    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); const snapshot = JSON.stringify(serverState()); if (serverMode && currentUser && !syncing && snapshot !== lastServerState) queueServerSave(); }
    async function syncFromServer() { if (!serverMode || !currentUser) return render(); syncing = true; try { const response = await fetch("/api/data", { cache:"no-store" }); if (response.status === 401) return showLogin(); if (!response.ok) throw new Error(); const data = await response.json(); if (data && Array.isArray(data.vehicles) && Array.isArray(data.records)) { state = migrateState(data); lastServerState = JSON.stringify(serverState()); localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } } catch { showToast("無法讀取伺服器資料"); } finally { syncing = false; render(); } }
    function queueServerSave() { clearTimeout(syncTimer); syncTimer = setTimeout(saveToServer, 250); }
    async function saveToServer() { try { const response = await fetch("/api/data", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify(serverState()) }); if (response.status === 401) return showLogin(); if (response.status === 409) return showToast("其他裝置已更新資料；此裝置尚未覆蓋，請重新整理後再確認儲存"); if (!response.ok) throw new Error(); state.revision = Number((await response.json()).revision) || state.revision; lastServerState = JSON.stringify(serverState()); localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch { showToast("伺服器儲存失敗"); } }
    function uid(prefix) { return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`; }
    function selectedVehicle() { return state.vehicles.find(vehicle => vehicle.id === state.selectedVehicleId) || state.vehicles[0] || null; }
    function vehicleRecords(vehicleId = state.selectedVehicleId) { return state.records.filter(record => record.vehicleId === vehicleId); }
    function render() { if (!selectedVehicle() && state.vehicles.length) state.selectedVehicleId = state.vehicles[0].id; renderHome(); renderMobileMode(); renderVehicles(); renderDashboard(); renderRecords(); renderReminders(); saveState(); }
    function showHome() { currentView = "home"; mobileDetailVisible = false; closeSidebar(); render(); }
    function showAccounts() { currentView = "accounts"; mobileDetailVisible = false; closeSidebar(); render(); }
    function showDetail() { currentView = "detail"; mobileDetailVisible = true; closeSidebar(); render(); }
    function renderHome() { const recent = [...state.records].sort((a,b) => String(b.id).localeCompare(String(a.id))).slice(0,8).map(record => ({ record, vehicle:state.vehicles.find(v => v.id === record.vehicleId) })).filter(x => x.vehicle); els.recentVehicleList.innerHTML = recent.length ? "" : `<div class="empty">目前沒有維修紀錄</div>`; recent.forEach(({ record, vehicle }) => { const item = document.createElement("button"); item.type = "button"; item.className = "recent-item"; item.innerHTML = `<strong>${escapeHtml(vehicle.plate || "未命名車輛")}</strong><div class="meta"><span>${escapeHtml(vehicle.vehicleGroup || "未分組")}</span><span>${formatNumber(record.mileage || vehicle.currentMileage || 0)} km</span><span>${typeLabels[record.type] || "其他"}</span></div><div class="note">${escapeHtml(summarizeServiceItems(record))}</div>`; item.addEventListener("click", () => { state.selectedVehicleId = vehicle.id; showDetail(); }); els.recentVehicleList.appendChild(item); }); renderCalendar(); }
    function renderCalendar() { const year = calendarDate.getFullYear(); const month = calendarDate.getMonth(); const currentDateKey = dateToKey(new Date()); els.calendarTitle.textContent = `${year} 年 ${month + 1} 月`; const weekdays = ["日","一","二","三","四","五","六"]; els.appointmentCalendar.innerHTML = weekdays.map(day => `<div class="calendar-weekday">${day}</div>`).join(""); const first = new Date(year, month, 1); const start = new Date(year, month, 1 - first.getDay()); for (let i = 0; i < 42; i++) { const day = new Date(start); day.setDate(start.getDate() + i); const dateKey = dateToKey(day); const appointments = monthlyAppointments().filter(item => item.date === dateKey); const cell = document.createElement("button"); cell.type = "button"; cell.className = `calendar-day ${day.getMonth() === month ? "" : "muted"} ${dateKey === currentDateKey ? "today" : ""}`; cell.innerHTML = `<strong>${day.getDate()}</strong>`; appointments.slice(0,3).forEach(item => { const note = document.createElement("span"); note.className = "calendar-item"; note.textContent = `${item.time ? `${item.time} ` : ""}${item.plate ? `${item.plate} ` : ""}${item.title}`; cell.appendChild(note); }); if (appointments.length > 3) { const more = document.createElement("span"); more.className = "calendar-item"; more.textContent = `另 ${appointments.length - 3} 筆`; cell.appendChild(more); } cell.addEventListener("click", () => openDayAppointments(dateKey)); els.appointmentCalendar.appendChild(cell); } renderAppointmentList(); renderAppointmentVehicleOptions(); }
    function monthlyAppointments() { const ym = dateToKey(new Date(calendarDate.getFullYear(), calendarDate.getMonth(), 1)).slice(0,7); return [...(state.appointments || [])].filter(item => String(item.date || "").startsWith(ym)).sort((a,b) => appointmentSortKey(a).localeCompare(appointmentSortKey(b)) || String(a.id).localeCompare(String(b.id))); }
    function renderAppointmentList() { const items = monthlyAppointments().filter(item => !isAppointmentExpired(item)); els.appointmentList.innerHTML = items.length ? "" : `<div class="empty">本月沒有未過期預約</div>`; items.forEach(item => { const node = document.createElement("button"); node.type = "button"; node.className = "recent-item"; node.innerHTML = `<strong>${escapeHtml(item.date)} ${escapeHtml(item.time || "")} ${escapeHtml(item.plate || "未指定車牌")}</strong><div class="note">${escapeHtml(item.title || "預約")}${item.notes ? `<br>${escapeHtml(item.notes)}` : ""}</div>`; node.addEventListener("click", () => openAppointmentModal(item)); els.appointmentList.appendChild(node); }); }
    function renderAppointmentVehicleOptions() { $("appointmentVehicleOptions").innerHTML = state.vehicles.map(vehicle => `<option value="${escapeHtml(vehicle.plate || "")}"></option>`).join(""); }
    function changeCalendarMonth(delta) { calendarDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + delta, 1); renderCalendar(); }
    function openDayAppointments(dateKey) { const items = (state.appointments || []).filter(item => item.date === dateKey); $("dayAppointmentsTitle").textContent = `${dateKey} 預約`; $("dayAppointmentsList").innerHTML = items.length ? "" : `<div class="empty">當日沒有預約</div>`; items.forEach(item => { const node = document.createElement("button"); node.type = "button"; node.className = "recent-item"; node.innerHTML = `<strong>${escapeHtml(item.time || "未指定時間")} ${escapeHtml(item.plate || "未指定車牌")}</strong><div class="note">${escapeHtml(item.title || "預約")}${item.notes ? `<br>${escapeHtml(item.notes)}` : ""}</div>`; node.addEventListener("click", () => { closeModal("dayAppointmentsModal"); openAppointmentModal(item); }); $("dayAppointmentsList").appendChild(node); }); $("newDayAppointmentBtn").classList.toggle("hidden", dateKey < dateToKey(new Date())); $("newDayAppointmentBtn").onclick = () => { closeModal("dayAppointmentsModal"); openAppointmentModal({ date:dateKey }); }; openModal("dayAppointmentsModal"); }
    function openAppointmentModal(appointment = null) { editingAppointmentId = appointment?.id || null; $("appointmentModalTitle").textContent = editingAppointmentId ? "編輯預約" : "新增預約"; $("appointmentDate").value = appointment?.date || today; $("appointmentTime").value = appointment?.time || "09:00"; $("appointmentPlate").value = appointment?.plate || selectedVehicle()?.plate || ""; $("appointmentTitle").value = appointment?.title || ""; $("appointmentNotes").value = appointment?.notes || ""; $("deleteAppointmentBtn").classList.toggle("hidden", !editingAppointmentId); renderAppointmentVehicleOptions(); openModal("appointmentModal"); }
    function saveAppointment(event) { event.preventDefault(); const data = { date:$("appointmentDate").value || today, time:$("appointmentTime").value || "09:00", plate:$("appointmentPlate").value.trim().toUpperCase(), title:$("appointmentTitle").value.trim(), notes:$("appointmentNotes").value.trim() }; if (!data.title) return showToast("請輸入預約內容"); if (editingAppointmentId) { state.appointments = state.appointments.map(item => item.id === editingAppointmentId ? { ...item, ...data } : item); showToast("預約已更新"); } else { state.appointments.push({ id:uid("apt"), ...data }); showToast("已新增預約"); } calendarDate = new Date(`${data.date}T00:00:00`); closeModal("appointmentModal"); render(); }
    function deleteAppointment() { if (!editingAppointmentId || !confirm("確定刪除此預約？")) return; state.appointments = state.appointments.filter(item => item.id !== editingAppointmentId); closeModal("appointmentModal"); showToast("預約已刪除"); render(); }
    function dateToKey(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`; }
    function appointmentSortKey(item) { return `${item.date || ""}T${item.time || "23:59"}`; }
    function isAppointmentExpired(item) { const time = item.time || "23:59"; const value = new Date(`${item.date || today}T${time}`).getTime(); return Number.isFinite(value) && value < Date.now(); }
    function renderMobileMode() { const pageMode = currentView === "home" || currentView === "accounts"; els.homePage.classList.toggle("hidden", currentView !== "home"); els.accountPage.classList.toggle("hidden", currentView !== "accounts"); if (pageMode) { els.detailPages.forEach(page => page.classList.add("hidden")); document.body.classList.add("mobile-detail-mode"); document.body.classList.remove("mobile-picker-mode"); closeSidebar(); return; } els.detailPages.forEach(page => page.classList.remove("hidden")); const shouldShowDetail = mobileDetailVisible || window.innerWidth > 1120; document.body.classList.toggle("mobile-detail-mode", shouldShowDetail); document.body.classList.toggle("mobile-picker-mode", !shouldShowDetail); if (window.innerWidth > 1120) closeSidebar(); }
    function openSidebar() { document.body.classList.add("sidebar-open"); } function closeSidebar() { document.body.classList.remove("sidebar-open"); }
    function renderVehicles() { const term = els.shopSearch.value.trim().toLowerCase(); const current = currentView === "detail" ? selectedVehicle() : null; const vehicles = state.vehicles.filter(vehicle => !term || [vehicle.plate, vehicle.vehicleGroup, vehicle.notes].join(" ").toLowerCase().includes(term)); els.vehicleList.innerHTML = ""; els.mobileVehicleList.innerHTML = ""; if (!vehicles.length) { const empty = `<div class="empty">目前沒有車輛</div>`; els.vehicleList.innerHTML = empty; els.mobileVehicleList.innerHTML = empty; return; } const groups = vehicles.reduce((map, vehicle) => { const name = vehicle.vehicleGroup || "未分組"; if (!map.has(name)) map.set(name, []); map.get(name).push(vehicle); return map; }, new Map()); [...groups.entries()].sort(([a],[b]) => a.localeCompare(b,"zh-Hant")).forEach(([groupName, groupVehicles]) => { const group = document.createElement("section"); group.className = "vehicle-group"; group.innerHTML = `<div class="vehicle-group-title">${escapeHtml(groupName)}<span>${groupVehicles.length}</span></div>`; groupVehicles.sort((a,b) => (a.plate || "").localeCompare(b.plate || "", "zh-Hant")).forEach(vehicle => group.appendChild(createVehicleButton(vehicle, current))); els.vehicleList.appendChild(group); }); vehicles.forEach(vehicle => els.mobileVehicleList.appendChild(createVehicleButton(vehicle, current))); }
    function createVehicleButton(vehicle, current) { const button = document.createElement("button"); button.type = "button"; button.className = `vehicle-button ${current && vehicle.id === current.id ? "active" : ""}`; button.innerHTML = `<strong>${escapeHtml(vehicle.plate || "未命名車輛")}</strong>`; button.addEventListener("click", () => { state.selectedVehicleId = vehicle.id; showDetail(); }); return button; }
    function renderDashboard() { const vehicle = selectedVehicle(); const records = vehicle ? vehicleRecords(vehicle.id) : []; const remindersCount = getReminders().length; els.vehicleTitle.textContent = vehicle ? (vehicle.plate || "未命名車輛") : "晶彩物流車隊保養"; els.vehicleSubtitle.textContent = vehicle ? `${vehicle.vehicleGroup || "未分組"}${vehicle.year ? ` / ${vehicle.year}` : ""}${vehicle.notes ? ` / ${vehicle.notes}` : ""}` : "請先新增或選擇車輛。"; els.statGroup.textContent = vehicle?.vehicleGroup || "未分組"; els.statMileage.textContent = `${formatNumber(vehicle?.currentMileage || 0)} km`; els.statTotal.textContent = `${records.length} 筆`; els.statReminders.textContent = `${remindersCount} 項`; $("vehicleQuickNote").value = vehicle?.notes || ""; $("vehicleQuickNote").disabled = !vehicle; $("editVehicleBtn").disabled = !vehicle; $("newRecordBtn").disabled = !vehicle; $("exportCsvBtn").disabled = !vehicle; $("quickServiceBtn").disabled = !vehicle; }
    function renderRecords() { const vehicle = selectedVehicle(); if (!vehicle) { els.recordList.innerHTML = `<div class="empty">請先新增車輛</div>`; return; } const term = els.recordSearch.value.trim().toLowerCase(); const type = els.typeFilter.value; const sort = els.sortSelect.value; let records = vehicleRecords(vehicle.id).filter(record => { const itemText = normalizeServiceItems(record).map(item => `${item.name} ${item.note}`).join(" "); const text = [itemText, record.technician, record.notes].join(" ").toLowerCase(); return (!type || record.type === type) && (!term || text.includes(term)); }); records.sort((a,b) => sort === "oldest" ? String(a.id).localeCompare(String(b.id)) : sort === "mileage" ? Number(b.mileage || 0) - Number(a.mileage || 0) : String(b.id).localeCompare(String(a.id))); els.recordList.innerHTML = records.length ? "" : `<div class="empty">目前沒有工單紀錄</div>`; records.forEach(record => { const card = document.createElement("article"); card.className = "record-card"; card.innerHTML = `<div><div class="record-title"><span class="tag ${record.type}">${typeLabels[record.type] || "其他"}</span><strong>${escapeHtml(summarizeServiceItems(record))}</strong></div><div class="meta"><span>${formatNumber(record.mileage || 0)} km</span>${record.technician ? `<span>技師：${escapeHtml(record.technician)}</span>` : ""}</div>${renderServiceItemsSummary(record)}${record.notes ? `<div class="note">${escapeHtml(record.notes)}</div>` : ""}</div><div><button class="small" type="button">編輯</button></div>`; card.querySelector("button").addEventListener("click", () => safeOpenRecordModal(record)); els.recordList.appendChild(card); }); }
    function renderReminders() { const reminders = getReminders(); els.reminderList.innerHTML = reminders.length ? "" : `<div class="empty">目前沒有里程提醒</div>`; reminders.forEach(item => { const node = document.createElement("div"); node.className = `reminder ${item.level}`; node.innerHTML = `<strong>${escapeHtml(item.title)}</strong><span>${escapeHtml(item.detail)}</span>`; els.reminderList.appendChild(node); }); }
    function getReminders() { const vehicle = selectedVehicle(); if (!vehicle) return []; const currentMileage = Number(vehicle.currentMileage || 0); const reminders = []; vehicleRecords(vehicle.id).forEach(record => normalizeServiceItems(record).forEach(item => { if (!item.nextMileage && !item.baseMileage) return; const baseMileage = Number(item.baseMileage || record.mileage || 0); const elapsed = baseMileage ? Math.max(0, currentMileage - baseMileage) : ""; const elapsedText = elapsed !== "" ? `已經過 ${formatNumber(elapsed)} km` : "尚未設定基準里程"; if (!item.nextMileage) { reminders.push({ title:`里程紀錄：${item.name || "施工項目"}`, detail:elapsedText, level:"normal", score:999999999 - Number(elapsed || 0) }); return; } const remaining = Number(item.nextMileage) - currentMileage; const interval = baseMileage && Number(item.nextMileage) > baseMileage ? Number(item.nextMileage) - baseMileage : ""; const progressText = elapsed !== "" ? `${elapsedText}${interval ? ` / 建議 ${formatNumber(interval)} km` : ""}，` : ""; reminders.push({ title:`里程提醒：${item.name || "施工項目"}`, detail:remaining < 0 ? `${progressText}已超過 ${formatNumber(Math.abs(remaining))} km，提醒里程 ${formatNumber(item.nextMileage)} km` : `${progressText}剩 ${formatNumber(remaining)} km，提醒里程 ${formatNumber(item.nextMileage)} km`, level:remaining < 0 ? "danger" : remaining <= 1000 ? "warning" : "normal", score:remaining }); })); return reminders.sort((a,b) => a.score - b.score); }
    function normalizeServiceItems(record = {}) { record = record || {}; if (Array.isArray(record.serviceItems)) return record.serviceItems.map(item => ({ name:String(item.name || "").trim(), note:String(item.note || "").trim(), nextMileage:item.nextMileage === "" || item.nextMileage == null ? "" : Number(item.nextMileage || 0), baseMileage:item.baseMileage === "" || item.baseMileage == null ? "" : Number(item.baseMileage || 0) })).filter(item => item.name || item.note || item.nextMileage || item.baseMileage); const name = String(record.item || "").trim(); const nextMileage = record.nextMileage === "" || record.nextMileage == null ? "" : Number(record.nextMileage || 0); return name || nextMileage ? [{ name:name || "施工項目", note:"", nextMileage, baseMileage:record.mileage || "" }] : []; }
    function getRecordItems(record = {}) { const items = normalizeServiceItems(record || {}); return items.length ? items : [{ name:"", note:"", nextMileage:"" }]; }
    function summarizeServiceItems(record = {}) { const items = normalizeServiceItems(record); if (!items.length) return record.item || "施工項目"; if (items.length === 1) return items[0].name || "施工項目"; return `${items[0].name || "施工項目"} 等 ${items.length} 項`; }
    function renderServiceItemsSummary(record) { const items = normalizeServiceItems(record); if (!items.length) return ""; return `<div class="note">${items.map(item => `${escapeHtml(item.name || "施工項目")}${item.note ? ` - ${escapeHtml(item.note)}` : ""}${item.baseMileage ? `，基準 ${formatNumber(item.baseMileage)} km` : ""}${item.nextMileage ? `，提醒 ${formatNumber(item.nextMileage)} km` : ""}`).join("<br>")}</div>`; }
    function renderServiceItemsEditor(items = []) { const container = $("serviceItems"); container.innerHTML = ""; (items.length ? items : [{ name:"", note:"", nextMileage:"" }]).forEach(item => addServiceItemRow(item)); }
    function addServiceItemRow(item = { name:"", note:"", nextMileage:"", baseMileage:"" }) { const container = $("serviceItems"); const row = document.createElement("div"); row.className = "service-item-row"; row.innerHTML = `<input class="service-item-name" placeholder="施工項目" value="${escapeHtml(item.name || "")}"><input class="service-item-note" placeholder="備註事項" value="${escapeHtml(item.note || "")}"><input class="service-item-next-mileage" type="number" min="0" step="1" placeholder="提醒里程" value="${Number(item.nextMileage || 0) || ""}"><label class="mileage-base-check"><input class="service-item-use-base" type="checkbox" ${item.baseMileage ? "checked" : ""}>以本次里程為紀錄</label><button class="danger" type="button">刪除</button>`; row.querySelector("button").addEventListener("click", () => { row.remove(); if (!container.children.length) addServiceItemRow(); }); container.appendChild(row); }
    function collectServiceItems() { const mileage = Number($("recordMileage").value) || ""; return [...document.querySelectorAll(".service-item-row")].map(row => ({ name:row.querySelector(".service-item-name").value.trim(), note:row.querySelector(".service-item-note").value.trim(), nextMileage:Number(row.querySelector(".service-item-next-mileage").value) || "", baseMileage:row.querySelector(".service-item-use-base").checked ? mileage : "" })).filter(item => item.name || item.note || item.nextMileage || item.baseMileage); }
    function openWorkOrderImportModal() { const vehicle = selectedVehicle(); $("workOrderPhoto").value = ""; $("workOrderPreview").innerHTML = "拍照或選擇舊工單照片"; $("importPlate").value = vehicle?.plate || ""; $("importMileage").value = vehicle?.currentMileage || ""; $("importType").value = "service"; $("importTechnician").value = ""; $("importItems").value = ""; $("importRawText").value = ""; $("ocrStatus").textContent = "辨識後請先確認欄位，再帶入工單。"; openModal("workOrderImportModal"); }
    function previewWorkOrderPhoto(event) { const file = event.target.files[0]; if (!file) return; const url = URL.createObjectURL(file); $("workOrderPreview").innerHTML = `<img src="${url}" alt="舊工單照片預覽">`; $("ocrStatus").textContent = "照片已選擇，可以開始辨識。"; }
    async function preprocessWorkOrderPhoto(file) { const url = URL.createObjectURL(file); try { const image = await new Promise((resolve, reject) => { const element = new Image(); element.onload = () => resolve(element); element.onerror = reject; element.src = url; }); const scale = Math.min(3, Math.max(1.6, 1800 / Math.max(image.naturalWidth, image.naturalHeight))); const canvas = document.createElement("canvas"); canvas.width = Math.round(image.naturalWidth * scale); canvas.height = Math.round(image.naturalHeight * scale); const context = canvas.getContext("2d", { willReadFrequently:true }); context.drawImage(image, 0, 0, canvas.width, canvas.height); const pixels = context.getImageData(0, 0, canvas.width, canvas.height); for (let index = 0; index < pixels.data.length; index += 4) { const gray = Math.round(pixels.data[index] * 0.299 + pixels.data[index + 1] * 0.587 + pixels.data[index + 2] * 0.114); const enhanced = Math.max(0, Math.min(255, (gray - 128) * 1.35 + 128)); pixels.data[index] = enhanced; pixels.data[index + 1] = enhanced; pixels.data[index + 2] = enhanced; } context.putImageData(pixels, 0, 0); return canvas; } finally { URL.revokeObjectURL(url); } }
    async function runWorkOrderOcr() { const file = $("workOrderPhoto").files[0]; if (!file) return showToast("請先拍照或選擇照片"); if (!window.Tesseract) return showToast("辨識工具尚未載入，請確認網路後重試"); $("ocrStatus").textContent = "正在整理照片並辨識重點..."; $("ocrWorkOrderBtn").disabled = true; try { const image = await preprocessWorkOrderPhoto(file); const result = await Tesseract.recognize(image, "chi_tra+eng", { logger: progress => { if (progress.status) $("ocrStatus").textContent = `正在辨識：${Math.round((progress.progress || 0) * 100)}%`; } }); const text = result?.data?.text || ""; const cleaned = cleanWorkOrderText(text); $("importRawText").value = cleaned; parseWorkOrderText(cleaned, true); $("ocrStatus").textContent = cleaned ? "辨識完成，已排除多數表格欄位，請確認車牌、里程與施工項目。" : "沒有讀到有效內容，請換較清楚、正面且光線均勻的照片。"; } catch (error) { console.error(error); $("ocrStatus").textContent = "辨識失敗，可改用手動輸入或貼上文字。"; showToast("照片辨識失敗"); } finally { $("ocrWorkOrderBtn").disabled = false; } }
    function cleanWorkOrderText(text) { const lines = String(text || "").split(/\r?\n/).map(line => line.replace(/[|¦_~`]+/g, " ").replace(/\s{2,}/g, " ").trim()).filter(Boolean); const blocked = /^(車牌|牌照|車號|里程|公里|日期|時間|電話|地址|金額|單價|數量|合計|總計|工單|客戶|公司|簽名|技師|備註|施工項目|維修項目|品名|規格|單位|\d+[.)、:：-]?)$/i; return [...new Set(lines.filter(line => line.length >= 2 && line.length <= 80 && !blocked.test(line) && !/^[-=\s]+$/.test(line)))].slice(0, 30).join("\n"); }
    function parseWorkOrderText(text, replaceItems = true) { text = String(text || ""); const plate = text.match(/[A-Z]{2,4}[-\s]?\d{2,4}/i)?.[0]?.replace(/\s+/g, "").toUpperCase(); if (plate) $("importPlate").value = plate; const mileageMatches = [...text.matchAll(/(?:里程|公里|km|KM)?\s*(\d{1,3}(?:,\d{3})+|\d{4,7})\s*(?:km|KM|公里)?/g)].map(match => Number(match[1].replaceAll(",", ""))).filter(value => value >= 1000 && value < 2000000); if (mileageMatches.length) $("importMileage").value = Math.max(...mileageMatches); const lower = text.toLowerCase(); if (lower.includes("維修") || lower.includes("故障") || lower.includes("更換") || lower.includes("更换")) $("importType").value = "repair"; if (lower.includes("保養") || lower.includes("保养") || lower.includes("機油") || lower.includes("机油")) $("importType").value = "service"; const lines = text.split(/\r?\n/).map(line => line.trim()).filter(Boolean); const blocked = /車牌|牌照|車號|里程|公里|km|日期|時間|電話|地址|金額|單價|數量|合計|總計|工單|客戶|公司|簽名|技師|備註|施工項目|維修項目|品名|規格|單位/i; const useful = /更換|更换|檢查|检查|保養|保养|維修|维修|清潔|清洁|調整|调整|拆裝|拆装|補充|补充|添加|更換|更换|機油|机油|煞車|刹车|輪胎|轮胎|濾芯|滤芯|電瓶|电瓶|皮帶|皮带|冷氣|空調|空调|故障|異音|异音/i; const items = lines.map(line => line.replace(/[|:：]/g, " ").replace(/\s{2,}/g, " ").trim()).filter(line => line.length >= 2 && line.length <= 40 && !blocked.test(line) && useful.test(line) && !/^\d+$/.test(line) && (!plate || !line.includes(plate))).slice(0, 12); if (replaceItems) $("importItems").value = [...new Set(items)].join("\n"); }
    function applyWorkOrderImport() { const plate = $("importPlate").value.trim().toUpperCase(); let vehicle = state.vehicles.find(item => item.plate.toUpperCase() === plate) || selectedVehicle(); if (!vehicle && plate) { vehicle = { id:uid("veh"), plate, vehicleGroup:"未分組", year:"", currentMileage:Number($("importMileage").value) || 0, notes:"舊工單匯入建立" }; state.vehicles.push(vehicle); } if (!vehicle) return showToast("請輸入車牌或先新增車輛"); state.selectedVehicleId = vehicle.id; currentView = "detail"; mobileDetailVisible = true; closeModal("workOrderImportModal"); safeOpenRecordModal(); $("recordType").value = $("importType").value; $("recordMileage").value = $("importMileage").value || vehicle.currentMileage || ""; $("technician").value = $("importTechnician").value.trim(); const items = $("importItems").value.split(/\r?\n/).map(name => ({ name:name.trim(), note:"", nextMileage:"", baseMileage:"" })).filter(item => item.name); renderServiceItemsEditor(items.length ? items : [{ name:"舊工單匯入", note:"請確認施工項目", nextMileage:"", baseMileage:"" }]); $("recordNotes").value = $("importRawText").value.trim() ? `舊工單拍照匯入：\n${$("importRawText").value.trim()}` : "舊工單拍照匯入"; render(); showToast("已帶入工單，請確認後儲存"); }
    function openVehicleModal(vehicle = null) { editingVehicleId = vehicle?.id || null; $("vehicleModalTitle").textContent = vehicle ? "編輯車輛資料" : "新增公司車輛"; $("plate").value = vehicle?.plate || ""; $("vehicleGroup").value = vehicle?.vehicleGroup || ""; $("year").value = vehicle?.year || ""; $("currentMileage").value = vehicle?.currentMileage || ""; $("vehicleNotes").value = vehicle?.notes || ""; $("deleteVehicleBtn").classList.toggle("hidden", !vehicle); openModal("vehicleModal"); }
    function saveVehicle(event) { event.preventDefault(); const data = { plate:$("plate").value.trim().toUpperCase(), vehicleGroup:$("vehicleGroup").value.trim() || "未分組", year:Number($("year").value) || "", currentMileage:Number($("currentMileage").value) || 0, notes:$("vehicleNotes").value.trim() }; if (editingVehicleId) { state.vehicles = state.vehicles.map(vehicle => vehicle.id === editingVehicleId ? { ...vehicle, ...data } : vehicle); showToast("車輛資料已更新"); } else { const vehicle = { id:uid("veh"), ...data }; state.vehicles.push(vehicle); state.selectedVehicleId = vehicle.id; currentView = "detail"; showToast("已新增車輛"); } closeModal("vehicleModal"); render(); }
    function saveVehicleQuickNote() { const vehicle = selectedVehicle(); if (!vehicle) return; vehicle.notes = $("vehicleQuickNote").value.trim(); saveState(); }
    function deleteVehicle() { const vehicle = selectedVehicle(); if (!vehicle || !confirm(`確定刪除 ${vehicle.plate} 及所有工單？`)) return; state.vehicles = state.vehicles.filter(item => item.id !== vehicle.id); state.records = state.records.filter(record => record.vehicleId !== vehicle.id); state.selectedVehicleId = state.vehicles[0]?.id || ""; currentView = "home"; closeModal("vehicleModal"); showToast("車輛已刪除"); render(); }
    function safeOpenRecordModal(record = null) { try { openRecordModal(record); } catch (error) { console.error(error); showToast(`無法開啟工單：${error.message}`); } }
    function openRecordModal(record = null) { const vehicle = selectedVehicle(); if (!vehicle) return showToast("請先選擇或新增車輛"); editingRecordId = record?.id || null; $("recordModalTitle").textContent = record ? "編輯工單紀錄" : "新增工單紀錄"; $("recordType").value = record?.type || "service"; renderServiceItemsEditor(getRecordItems(record)); $("technician").value = record?.technician || ""; $("recordMileage").value = record?.mileage || vehicle.currentMileage || ""; $("recordNotes").value = record?.notes || ""; $("deleteRecordBtn").classList.toggle("hidden", !record); openModal("recordModal"); }
    function saveRecord(event) { event.preventDefault(); const vehicle = selectedVehicle(); if (!vehicle) return; const mileage = Number($("recordMileage").value) || 0; const serviceItems = collectServiceItems(); if (!serviceItems.length) return showToast("請至少新增一個施工項目"); const data = { vehicleId:vehicle.id, type:$("recordType").value, serviceItems, technician:$("technician").value.trim(), mileage, notes:$("recordNotes").value.trim() }; clearOldMileageReminders(vehicle.id, serviceItems, editingRecordId); if (editingRecordId) { state.records = state.records.map(record => record.id === editingRecordId ? { ...record, ...data } : record); syncVehicleMileageFromRecords(vehicle.id); showToast("工單已更新"); } else { state.records.push({ id:uid("rec"), ...data }); if (mileage > Number(vehicle.currentMileage || 0)) vehicle.currentMileage = mileage; showToast("已新增工單"); } closeModal("recordModal"); render(); }
    function clearOldMileageReminders(vehicleId, newItems, currentRecordId = null) { const names = new Set(newItems.filter(item => item.nextMileage).map(item => normalizeItemName(item.name)).filter(Boolean)); if (!names.size) return; state.records = state.records.map(record => { if (record.vehicleId !== vehicleId || record.id === currentRecordId) return record; return { ...record, serviceItems:normalizeServiceItems(record).map(item => names.has(normalizeItemName(item.name)) ? { ...item, nextMileage:"" } : item) }; }); }
    function normalizeItemName(name) { return String(name || "").trim().toLowerCase(); }
    function syncVehicleMileageFromRecords(vehicleId) { const vehicle = state.vehicles.find(item => item.id === vehicleId); if (!vehicle) return; const mileages = vehicleRecords(vehicleId).map(record => Number(record.mileage || 0)).filter(Boolean); if (mileages.length) vehicle.currentMileage = Math.max(...mileages); }
    function deleteRecord() { if (!editingRecordId || !confirm("確定刪除此工單？")) return; const record = state.records.find(item => item.id === editingRecordId); const vehicleId = record?.vehicleId || selectedVehicle()?.id; state.records = state.records.filter(record => record.id !== editingRecordId); syncVehicleMileageFromRecords(vehicleId); closeModal("recordModal"); showToast("工單已刪除，里程已更新"); render(); }
    function quickServiceReminder() { const vehicle = selectedVehicle(); if (!vehicle) return; editingRecordId = null; $("recordModalTitle").textContent = "新增保養提醒"; $("recordType").value = "service"; renderServiceItemsEditor([{ name:"定期保養", note:"", nextMileage:Number(vehicle.currentMileage || 0) + 5000, baseMileage:vehicle.currentMileage || "" }]); $("technician").value = ""; $("recordMileage").value = vehicle.currentMileage || ""; $("recordNotes").value = "系統建立定期保養提醒，建議每 5,000 km 檢查。"; $("deleteRecordBtn").classList.add("hidden"); openModal("recordModal"); }
    function downloadBackup() { downloadBlob(new Blob([JSON.stringify(state, null, 2)], { type:"application/json" }), `jingcai-logistics-maintenance-backup-${today}.json`); showToast("備份已匯出"); }
    function restoreBackup(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = () => { try { const parsed = JSON.parse(reader.result); if (!Array.isArray(parsed.vehicles) || !Array.isArray(parsed.records)) throw new Error(); state = migrateState(parsed); render(); showToast("備份已匯入"); } catch { showToast("備份格式不正確"); } finally { event.target.value = ""; } }; reader.readAsText(file); }
    function exportCsv() { const vehicle = selectedVehicle(); if (!vehicle) return; const rows = [["車牌","分組","類型","施工項目","技師","里程","備註"], ...vehicleRecords(vehicle.id).map(record => [vehicle.plate, vehicle.vehicleGroup || "未分組", typeLabels[record.type] || "其他", normalizeServiceItems(record).map(item => `${item.name}${item.note ? ` - ${item.note}` : ""}${item.nextMileage ? `，提醒 ${item.nextMileage}km` : ""}`).join("；"), record.technician, record.mileage, record.notes])]; const csv = rows.map(row => row.map(cell => `"${String(cell ?? "").replaceAll('"','""')}"`).join(",")).join("\n"); downloadBlob(new Blob(["\ufeff" + csv], { type:"text/csv;charset=utf-8" }), `${vehicle.plate || "晶彩物流車輛"}-維修保養紀錄.csv`); showToast("表格已匯出"); }
    function normalizeType(type) { if (type === "保養") return "service"; if (type === "維修") return "repair"; if (type === "其他") return "other"; return type || "service"; }
    function openModal(id) { $(id).classList.add("open"); } function closeModal(id) { $(id).classList.remove("open"); }
    function showToast(message) { els.toast.textContent = message; els.toast.classList.add("show"); clearTimeout(showToast.timer); showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 2200); }
    function formatNumber(value) { return Number(value || 0).toLocaleString("zh-TW"); }
    function escapeHtml(value) { return String(value ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
    function downloadBlob(blob, filename) { const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.href = url; link.download = filename; document.body.appendChild(link); link.click(); link.remove(); URL.revokeObjectURL(url); }
