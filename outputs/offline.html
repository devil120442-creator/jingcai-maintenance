<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>晶彩物流保養 - 離線</title>
  <style>
    :root{font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif;color:#172033;background:#f5f7fa}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}
    main{width:min(420px,100%);padding:24px;border:1px solid #d8dee8;border-radius:12px;background:#fff;box-shadow:0 14px 34px rgba(23,32,51,.08)}
    h1{margin:0 0 10px;font-size:26px}
    p{margin:0;color:#667085;line-height:1.7}
    .mark{width:52px;height:52px;margin-bottom:14px;border-radius:12px;display:grid;place-items:center;background:#0f766e;color:#fff;font-weight:900;font-size:26px}
  </style>
</head>
<body>
  <main>
    <div class="mark">晶</div>
    <h1>目前無法連線</h1>
    <p>請確認手機網路、Wi-Fi、電腦伺服器或 Cloudflare Tunnel 是否正在運行，再重新開啟晶彩物流保養。</p>
  </main>
</body>
</html>
